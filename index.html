<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="The House Of Shimmie — bright characters and sunshine energy."
    />
    <title>The House Of Shimmie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #1a1510;
        --paper: #fffef6;
        --wash: linear-gradient(
          160deg,
          #fffef8 0%,
          #fff4c8 38%,
          #ffe8a8 72%,
          #ffd8c8 100%
        );
        --font-display: "Fraunces", Georgia, serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        font-family: system-ui, sans-serif;
        color: var(--ink);
        background: var(--wash);
        background-attachment: fixed;
      }

      img {
        max-width: 100%;
        height: auto;
        display: block;
      }

      .page {
        width: min(1080px, 100%);
        margin-inline: auto;
        padding: clamp(1.75rem, 5vw, 3rem) clamp(1rem, 4vw, 2rem)
          clamp(2.5rem, 6vw, 4rem);
      }

      h1 {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: clamp(1.85rem, 5.5vw, 3rem);
        line-height: 1.1;
        letter-spacing: -0.03em;
        text-align: center;
        text-wrap: balance;
        margin: 0 0 clamp(1.75rem, 5vw, 2.75rem);
      }

      .gallery {
        display: grid;
        gap: clamp(1.25rem, 3vw, 2rem);
        grid-template-columns: 1fr;
      }

      @media (min-width: 700px) {
        .gallery {
          grid-template-columns: repeat(3, 1fr);
          align-items: end;
        }
      }

      .gallery figure {
        margin: 0;
        padding: clamp(1rem, 2.5vw, 1.35rem);
        background: color-mix(in srgb, #ffffff 78%, transparent);
        border-radius: 1.25rem;
        box-shadow: 0 16px 40px rgba(26, 21, 16, 0.08);
      }

      .gallery img {
        margin-inline: auto;
        max-height: min(52vh, 420px);
        width: auto;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1>The House Of Shimmie</h1>
      <div class="gallery">
        <figure>
          <img
            src="assets/hero-wax.png"
            alt="Bright yellow abstract shape"
            width="800"
            height="800"
            loading="eager"
            decoding="async"
          />
        </figure>
        <figure>
          <img
            src="assets/hero-red.png"
            alt="Red, cartoon surf character with arms raised"
            width="800"
            height="800"
            loading="lazy"
            decoding="async"
          />
        </figure>
        <figure>
          <img
            src="assets/hero-shimmie.png"
            alt="Shimmie mascot in a yellow sun hat"
            width="800"
            height="800"
            loading="lazy"
            decoding="async"
          />
        </figure>
      </div>
    </main>
  </body>
</html>
